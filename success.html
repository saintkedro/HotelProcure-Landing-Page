<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success | Hotel Procure</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific styles for the Success Page layout */
        .success-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--deep-purple);
            background: radial-gradient(circle at center, #2a0052 0%, #05000a 100%);
            padding: 20px;
        }

        .success-card {
            text-align: center;
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .success-card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        .success-card p {
            color: #fff;
            opacity: 0.9;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .whatsapp-cta {
            background: #25D366;
            color: white;
            padding: 18px 30px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s ease, background 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
        }

        .whatsapp-cta:hover {
            transform: translateY(-3px);
            background: #1eb954;
        }

        .back-home {
            display: block;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .back-home:hover {
            color: var(--gold);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="success-wrapper">
        <div class="glass-card success-card">
            <div class="success-icon">✓</div>
            <h1>You're on the List!</h1>
            <p>Thank you for applying to be a part of Hotel Procure. We have received your details and our procurement team will review your profile shortly.</p>
            
            <a href="https://wa.me/2349127994724" class="whatsapp-cta">

                Join Vendor Community
            </a>

            <a href="index.html" class="back-home">Return to Homepage</a>
        </div>
    </main>

</body>
</html>
